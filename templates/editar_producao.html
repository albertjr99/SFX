{% extends 'base.html' %}
{% block title %}Editar Produção — IPAJM{% endblock %}
{% block topbar_title %}Editar Registro{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Editar Produção</h1>
  <p>Altere os dados do registro selecionado</p>
</div>

<div class="card" style="max-width:580px;">
  <div class="card-header">
    <i class="ri-edit-2-line" style="color:#16a34a;font-size:17px;"></i>
    <h2>Dados do Processo</h2>
  </div>
  <div class="card-body">
    <form method="post">
      <div style="display:grid; gap:16px; margin-bottom:24px;">
        <div>
          <label class="form-label">Nº do Processo</label>
          <input type="text" name="numero_processo"
                 value="{{ producao.numero_processo or '' }}"
                 class="form-input" placeholder="Ex: 12345/2025">
        </div>
        <div>
          <label class="form-label">Nome do Segurado</label>
          <input type="text" name="nome_do_segurado"
                 value="{{ producao.nome_do_segurado or '' }}"
                 class="form-input" placeholder="Nome completo">
        </div>
        <div>
          <label class="form-label">Fase</label>
          <select name="fase" class="form-select">
            <option value="">Selecione a fase</option>
            <option value="Análise" {% if producao.fase == 'Análise' %}selected{% endif %}>Análise</option>
            <option value="Conferência" {% if producao.fase == 'Conferência' %}selected{% endif %}>Conferência</option>
          </select>
        </div>
      </div>
      <div style="display:flex; gap:10px;">
        <button type="submit" class="btn btn-primary">
          <i class="ri-save-line"></i> Salvar Alterações
        </button>
        <a href="{{ url_for('painel_gerente') }}" class="btn btn-secondary">
          <i class="ri-arrow-left-line"></i> Cancelar
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
